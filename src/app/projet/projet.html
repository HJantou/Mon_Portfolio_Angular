<div class="project-item">
    <div class="container">
        <div class="project-info">
            <h3>{{ projetItems.title }}</h3>
            <p>{{ projetItems.description }}</p>
            <span class="project-tech">{{ projetItems.langage}}</span>
        </div>
        <button class="project-arrow" (click)="onMore($event)">→ voir plus</button>
    </div>
    <div class="project-img">
        <img [src]="projetItems.projetImg[0]" alt="">
    </div>
    <div class="project-img-more">
        @for(i of projetItems.projetImg; track i){
            <img [src]="i" alt="" (click)="ouvrirLecteur(i)">
        }
    </div>
    <div class="lecteur-overlay" *ngIf="imageSelectionnee" (click)="fermerLecteur()">
        <!-- Bouton pour fermer -->
        <span class="bouton-fermer">&times;</span>
  
        <!-- L'image agrandie (Le click stopPropagation évite que fermerLecteur se déclenche si on clique sur l'image elle-même) -->
        <img [src]="imageSelectionnee" class="image-agrandie" (click)="$event.stopPropagation()">
    </div>
</div>
